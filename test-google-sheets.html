<!DOCTYPE html>
<html>
<head>
    <title>Google Sheets Connection Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-weight: bold;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        pre {
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <h1>🧪 Google Sheets Connection Test</h1>

    <div class="info">
        Testing connection to: <br>
        <a href="https://docs.google.com/spreadsheets/d/1jX9hiYLuL-BFTspOHJIGBuFZYowXW7uKtOnrlkeu6fw" target="_blank">
            Your Google Sheet
        </a>
    </div>

    <button onclick="testConnection()">▶ Test Connection</button>

    <div id="results"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="config.js"></script>
    <script>
        async function testConnection() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="info">⏳ Testing connection...</div>';

            try {
                // Test ShopTuning tab
                const csvUrl = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEETS_CONFIG.SHEET_ID}/export?format=csv&gid=${GOOGLE_SHEETS_CONFIG.TABS.SHOP_TUNING}`;

                console.log('Fetching:', csvUrl);

                const response = await fetch(csvUrl);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const csvText = await response.text();
                const workbook = XLSX.read(csvText, { type: 'string' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const data = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                resultsDiv.innerHTML = `
                    <div class="success">✅ Connection Successful!</div>
                    <h3>Data Preview:</h3>
                    <pre>${JSON.stringify(data.slice(0, 5), null, 2)}</pre>
                    <p><strong>Total rows loaded:</strong> ${data.length}</p>
                    <div class="success">
                        ✅ Google Sheets integration is working!<br>
                        You can now use the main shop page.
                    </div>
                `;

            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="error">
                        ❌ Connection Failed<br><br>
                        <strong>Error:</strong> ${error.message}
                    </div>
                    <div class="info">
                        <strong>Troubleshooting Steps:</strong><br>
                        1. Make sure the Google Sheet is publicly accessible<br>
                        2. Open the sheet: <a href="https://docs.google.com/spreadsheets/d/${GOOGLE_SHEETS_CONFIG.SHEET_ID}/edit" target="_blank">Click here</a><br>
                        3. Click "Share" button → Set to "Anyone with the link can view"<br>
                        4. Retry this test
                    </div>
                    <h3>Debug Info:</h3>
                    <pre>${error.stack || error.toString()}</pre>
                `;
            }
        }
    </script>
</body>
</html>
