<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Shop - Playtesting Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background -->
    <div class="game-background"></div>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="currency-display">
            <div class="currency gems">
                <img src="asset_upload/gem.png" class="gem-icon" alt="Gems">
                <span id="gems-amount">191</span>
            </div>
            <div class="currency gold">
                <img src="asset_upload/gold.png" class="gold-icon" alt="Gold">
                <span id="gold-amount">765</span>
            </div>
        </div>
        <div style="position: absolute; left: 50%; transform: translateX(-50%); text-align: center;">
            <h1 class="shop-title">SHOP</h1>
            <div style="font-size: 11px; color: rgba(255,255,255,0.7); margin-top: -5px;">
                📊 Live from <a href="https://docs.google.com/spreadsheets/d/1jX9hiYLuL-BFTspOHJIGBuFZYowXW7uKtOnrlkeu6fw" target="_blank" style="color: #4ade80; text-decoration: none;">Google Sheets</a>
            </div>
        </div>
        <button class="close-btn" onclick="alert('Close shop')">✕</button>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Left Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">FEATURED</div>
            <button class="sidebar-btn active">DAILY</button>
            <button class="sidebar-btn">SHOP</button>
            <button class="sidebar-btn">GEMS</button>
            <button class="sidebar-btn">RUNES</button>
        </div>

        <!-- Shop Content -->
        <div class="shop-content">
            <!-- Shop Items Container -->
            <div class="shop-items-container">
                <div class="shop-items-wrapper" id="shop-items-wrapper">
                    <div class="shop-items" id="shop-items">
                        <!-- Items will be generated by JavaScript -->
                    </div>
                </div>
                <div class="scroll-indicator"></div>
            </div>
        </div>
    </div>

    <!-- Controls Panel -->
    <div class="controls-panel">
        <div class="control-group">
            <label for="castle-level">Castle Level:</label>
            <input type="number" id="castle-level" min="1" max="20" value="4">
            <button onclick="generateShop()">Refresh Shop</button>
        </div>
        <div class="control-group">
            <button onclick="randomizeShop()">Random Shop</button>
            <button onclick="resetPurchases()">Reset Purchases</button>
        </div>
        <div class="control-group scroll-controls">
            <button class="scroll-arrow scroll-arrow-left" id="scroll-left" aria-label="Scroll Left">
                <span>◀</span>
            </button>
            <button class="scroll-arrow scroll-arrow-right" id="scroll-right" aria-label="Scroll Right">
                <span>▶</span>
            </button>
        </div>
        <div class="debug-info" id="debug-info"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="config.js"></script>
    <script src="shop-data.js"></script>
    <script src="shop.js"></script>
</body>
</html>
